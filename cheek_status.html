<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیگیری وضعیت رزرو | کتابخانه</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Tahoma', sans-serif;
        }
        .card {
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: none;
            margin-bottom: 25px;
        }
        .card-header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            border-radius: 25px 25px 0 0;
            padding: 20px;
            font-weight: bold;
        }
        .ready-card {
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            border-right: 8px solid #28a745;
        }
        .waiting-card {
            background: #fff3cd;
            border-right: 8px solid #ffc107;
        }
        .position-badge {
            background: #dc3545;
            color: white;
            border-radius: 50px;
            padding: 5px 15px;
            font-weight: bold;
        }
        .btn-check {
            border-radius: 50px;
            padding: 12px 30px;
            background: #2a5298;
            color: white;
            font-weight: bold;
        }
        .search-box {
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            font-size: 1.1rem;
        }
        .notify-icon {
            font-size: 2rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center text-white mb-4">
        <h1><i class="fas fa-search"></i> پیگیری وضعیت رزرو</h1>
        <p>نام خود را وارد کنید تا ببینید کدام کتاب‌ها برای شما آماده شده است</p>
    </div>

    <!-- کارت جستجو -->
    <div class="card">
        <div class="card-header">
            <i class="fas fa-user-circle"></i> جستجوی وضعیت من
        </div>
        <div class="card-body text-center p-4">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <input type="text" id="userName" class="form-control search-box" placeholder="مثال: سارا محمدی">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-check w-100" onclick="checkStatus()">
                        <i class="fas fa-eye"></i> بررسی وضعیت
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- نتیجه جستجو -->
    <div id="resultSection" style="display: none;">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-clipboard-list"></i> وضعیت رزروهای <span id="userNameDisplay"></span>
            </div>
            <div class="card-body" id="resultContent">
                <!-- نتیجه در اینجا نمایش داده می‌شود -->
            </div>
        </div>
    </div>
</div>

<script>
    async function checkStatus() {
        let userName = document.getElementById("userName").value.trim();
        if (!userName) {
            alert("لطفاً نام خود را وارد کنید");
            return;
        }
        
        document.getElementById("userNameDisplay").innerText = userName;
        
        // دریافت لیست رزروها از سرور
        let res = await fetch('/reservations');
        let allReserves = await res.json();
        
        // فیلتر رزروهای این کاربر
        let myReserves = allReserves.filter(r => r.user_name === userName);
        
        if (myReserves.length === 0) {
            document.getElementById("resultContent").innerHTML = `
                <div class="alert alert-info text-center">
                    <i class="fas fa-info-circle"></i> شما هیچ رزرو فعالی ندارید.
                </div>
            `;
            document.getElementById("resultSection").style.display = "block";
            return;
        }
        
        // دسته‌بندی: آماده تحویل (نوبت رسیده) و در صف انتظار
        let readyBooks = myReserves.filter(r => r.notified === 'yes');
        let waitingBooks = myReserves.filter(r => r.notified !== 'yes');
        
        let html = "";
        
        // بخش کتاب‌های آماده تحویل
        if (readyBooks.length > 0) {
            html += `<div class="alert alert-success mb-4">
                        <h4><i class="fas fa-bell"></i> 📢 کتاب‌های آماده تحویل</h4>
                        <p>کتاب‌های زیر برگشت خورده‌اند و برای شما آماده است. لطفاً برای امانت گرفتن به کتابخانه مراجعه کنید.</p>
                     </div>`;
            
            for (let book of readyBooks) {
                html += `
                    <div class="ready-card p-3 mb-3 rounded">
                        <div class="row align-items-center">
                            <div class="col-2 text-center">
                                <i class="fas fa-check-circle notify-icon text-success"></i>
                            </div>
                            <div class="col-7">
                                <h5><i class="fas fa-book"></i> ${book.item_name}</h5>
                                <small class="text-muted">تاریخ رزرو: ${book.reserve_date}</small>
                            </div>
                            <div class="col-3 text-center">
                                <span class="badge bg-success p-2">✅ آماده تحویل</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        // بخش کتاب‌های در صف انتظار
        if (waitingBooks.length > 0) {
            html += `<hr><h4 class="mt-3"><i class="fas fa-clock"></i> کتاب‌های در صف انتظار</h4>`;
            
            for (let book of waitingBooks) {
                let positionText = book.position === 1 ? "نفر بعدی" : `${book.position} نفر قبل از شما`;
                html += `
                    <div class="waiting-card p-3 mb-3 rounded">
                        <div class="row align-items-center">
                            <div class="col-2 text-center">
                                <i class="fas fa-hourglass-half notify-icon text-warning"></i>
                            </div>
                            <div class="col-7">
                                <h5><i class="fas fa-book"></i> ${book.item_name}</h5>
                                <small class="text-muted">تاریخ رزرو: ${book.reserve_date}</small>
                            </div>
                            <div class="col-3 text-center">
                                <span class="position-badge">⏳ ${positionText}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        document.getElementById("resultContent").innerHTML = html;
        document.getElementById("resultSection").style.display = "block";
    }
    
    // پشتیبانی از کلید Enter
    document.getElementById("userName").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            checkStatus();
        }
    });
</script>
</body>
</html>
