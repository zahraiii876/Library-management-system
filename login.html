<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به سایت هشت بهشت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2d4a5a 0%, #4a7a7a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tahoma', sans-serif;
        }
        .login-box {
            background: rgba(255, 248, 240, 0.95);
            padding: 40px 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .login-box h3 {
            color: #2d4a5a;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-box p {
            color: #4a6a6a;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        .form-control {
            border-radius: 50px;
            padding: 12px 20px;
            border: 1px solid #c0d0d0;
            background: rgba(255,255,255,0.8);
        }
        .form-control:focus {
            border-color: #4a7a7a;
            box-shadow: 0 0 0 3px rgba(74, 122, 122, 0.2);
        }
        .btn-login {
            border-radius: 50px;
            padding: 12px;
            background: linear-gradient(90deg, #2d4a5a, #4a7a7a);
            color: white;
            font-weight: bold;
            border: none;
            width: 100%;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 122, 122, 0.4);
        }
        .login-icon {
            text-align: center;
            font-size: 3rem;
            color: #2d4a5a;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-icon">
        📚
    </div>
    <h3 class="text-center">ورود به سایت هشت بهشت</h3>
    <p class="text-center">برای کتابداران محترم</p>
    <form action="/do_login" method="POST">
        <div class="mb-3">
            <label class="form-label">نام کاربری</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">رمز عبور</label>
            <input type="password" name="password" class="form-control" placeholder="رمز عبور" required>
        </div>
        <button type="submit" class="btn-login">ورود به پنل مدیریت</button>
    </form>
    <div class="text-center mt-3">
        <a href="/register" class="text-decoration-none">ثبت‌نام کتابدار جدید</a>
    </div>
    <div class="text-center mt-2 text-muted" style="font-size:0.85rem;">
        <i class="fas fa-shield-alt"></i> ورود فقط برای کتابداران مجاز
    </div>
</div>
</body>
</html>
