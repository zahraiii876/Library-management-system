<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ثبت‌نام کتابدار | هشت بهشت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2d4a5a 0%, #4a7a7a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tahoma', sans-serif;
        }
        .register-box {
            background: rgba(255, 248, 240, 0.95);
            padding: 40px 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 420px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .register-box h3 {
            color: #2d4a5a;
            font-weight: bold;
        }
        .form-control {
            border-radius: 50px;
            padding: 12px 20px;
            border: 1px solid #c0d0d0;
            background: rgba(255,255,255,0.8);
        }
        .btn-register {
            border-radius: 50px;
            padding: 12px;
            background: linear-gradient(90deg, #2d4a5a, #4a7a7a);
            color: white;
            font-weight: bold;
            border: none;
            width: 100%;
            transition: 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 122, 122, 0.4);
        }
    </style>
</head>
<body>
<div class="register-box">
    <h3 class="text-center">📚 ثبت‌نام کتابدار جدید</h3>
    <p class="text-center text-muted">اطلاعات خود را وارد کنید</p>
    <form action="/register" method="POST">
        <div class="mb-3">
            <label class="form-label">نام کامل</label>
            <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">نام کاربری</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">رمز عبور</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-register">ثبت‌نام</button>
    </form>
    <div class="text-center mt-3">
        <a href="/login" class="text-decoration-none">قبلاً ثبت‌نام کرده‌اید؟ وارد شوید</a>
    </div>
</div>
</body>
</html>
